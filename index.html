<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        #chart { background: white; margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mp-dot { stroke: #fff; stroke-width: 0.5px; }
        .mp-dot:hover { stroke: #000; stroke-width: 2px; cursor: pointer; }
        .tooltip { position: absolute; padding: 8px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 4px; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>UK House of Commons Seating</h1>
    <div id="chart"></div>

    <script>
        const width = 800;
        const height = 500;
        const margin = 50;

        const colorMap = {
            "Labour": "#E4003B",
            "Labour (Co-op)": "#E4003B",
            "Conservative": "#0087DC",
            "Liberal Democrat": "#FAA61A",
            "Reform UK": "#12B6CF",
            "Green Party": "#6AB023",
            "Scottish National Party": "#FDF38E",
            "Plaid Cymru": "#005B54",
            "Independent": "#DCDCDC",
            "Speaker": "#37312D"
        };
        
        // 1. Create the SVG canvas
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("opacity", 0);

        // 2. Load the JSON data generated by Perl
        d3.json("public/members.json").then(data => {
            
            // Sort by party to group colors together
            data.sort((a, b) => a.party.localeCompare(b.party));
            const totalSeats = data.length;
            const rows = 12; // A few more rows makes it look "fuller"
            const seatsPerRow = Math.ceil(totalSeats / rows);
            
            data.forEach((mp, i) => {
                // Determine which row and position in that row the MP belongs to
                const rowNumber = Math.floor(i / seatsPerRow);
                const posInRow = i % seatsPerRow;
            
                // Radius: inner circle starts at 150, each row adds 25px
                const r = 160 + (rowNumber * 22); 
                
                // Angle: We want to go from 180° (Left) to 360° (Right)
                // We add a tiny offset to prevent dots from sitting exactly on the edge
                const angle = Math.PI + (posInRow / (seatsPerRow - 1)) * Math.PI;
            
                // Math for positioning (Standard Polar to Cartesian conversion)
                const x = (width / 2) + r * Math.cos(angle);
                const y = (height - 50) + r * Math.sin(angle);

                svg.append("circle")
                    .attr("cx", x)
                    .attr("cy", y)
                    .attr("r", 6)
                    // Use the map first, then the API color, then a default grey
                    .attr("fill", d => colorMap[d.party] || (d.party_color ? `#${d.party_color}` : "#808080"))
                    .attr("class", "mp-dot");
            });        
        });
    </script>
</body>
</html>
