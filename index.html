<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        #chart { background: white; margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mp-dot { stroke: #fff; stroke-width: 0.5px; }
        .mp-dot:hover { stroke: #000; stroke-width: 2px; cursor: pointer; }
        .tooltip { position: absolute; padding: 8px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 4px; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>UK House of Commons Seating</h1>
    <div id="chart"></div>

    <script>
        const width = 800;
        const height = 500;
        const margin = 50;

        // 1. Create the SVG canvas
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("opacity", 0);

        // 2. Load the JSON data generated by Perl
        d3.json("members.json").then(data => {
            
            // Sort by party to group colors together
            data.sort((a, b) => a.party.localeCompare(b.party));

            const totalSeats = data.length;
            const rows = 10; // Number of concentric rows
            const seatsPerRow = Math.ceil(totalSeats / rows);

            // 3. Drawing Logic
            data.forEach((mp, i) => {
                const row = Math.floor(i / seatsPerRow);
                const col = i % seatsPerRow;
                
                // Radius increases for each row
                const r = 150 + (row * 25); 
                // Angle spreads MPs in a semi-circle (180 degrees)
                const angle = Math.PI + (col / seatsPerRow) * Math.PI;

                const x = (width / 2) + r * Math.cos(angle);
                const y = (height - margin) + r * Math.sin(angle);

                // 4. Append the MP "seat"
                svg.append("circle")
                    .attr("cx", x)
                    .attr("cy", y)
                    .attr("r", 8)
                    .attr("fill", `#${mp.party_color || 'ccc'}`)
                    .attr("class", "mp-dot")
                    .on("mouseover", (event) => {
                        tooltip.transition().duration(200).style("opacity", .9);
                        tooltip.html(`<strong>${mp.name}</strong><br/>${mp.party}<br/>${mp.constituency}`)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", () => {
                        tooltip.transition().duration(500).style("opacity", 0);
                    });
            });
        });
    </script>
</body>
</html>
