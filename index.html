<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        #chart { background: white; margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mp-dot { stroke: #fff; stroke-width: 0.5px; }
        .mp-dot:hover { stroke: #000; stroke-width: 2px; cursor: pointer; }
        .tooltip { position: absolute; padding: 8px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 4px; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>UK House of Commons Seating</h1>
    <div id="chart"></div>

<script>

const width = 800;
    const height = 500;

    const svg = d3.select("#chart")
        .append("svg")
        .attr("viewBox", `0 0 ${width} ${height}`)
        .attr("preserveAspectRatio", "xMidYMid meet")
        .style("width", "100%")
        .style("height", "auto");

    const tooltip = d3.select("body").append("div").attr("class", "tooltip").style("opacity", 0);

    const colorMap = {
        "Labour": "#E4003B", "Labour (Co-op)": "#E4003B",
        "Conservative": "#0087DC", "Liberal Democrat": "#FAA61A",
        "Reform UK": "#12B6CF", "Green Party": "#6AB023",
        "Scottish National Party": "#FDF38E", "Plaid Cymru": "#005B54",
        "Independent": "#DCDCDC", "Speaker": "#37312D"
    };

    d3.json("public/members.json").then(rawData => {
        const data = rawData.filter(d => d && d.party);
        data.sort((a, b) => a.party.localeCompare(b.party));

        const totalSeats = data.length;
        const rows = 12; 
        const seatsPerRow = Math.ceil(totalSeats / rows);

// Use a hardcoded number for the spread to force the curve
        const dotsInRow = 55; 

data.forEach((mp, i) => {
        const rowNumber = Math.floor(i / seatsPerRow);
        const posInRow = i % seatsPerRow;

        // Radius: How far from the bottom-center focal point
        const r = 150 + (rowNumber * 25); 
        
        // Angle: Map from Math.PI (Left) to 2 * Math.PI (Right)
        // This creates a half-circle arc that opens downward
        const angle = Math.PI + (posInRow / (seatsPerRow - 1)) * Math.PI;

        // x centers on the middle of the 800px width
        // y starts at the bottom and uses sin() to go UP
        const x = (width / 2) + r * Math.cos(angle);
        const y = (height - 40) + r * Math.sin(angle);

        svg.append("circle")
            .attr("cx", x)
            .attr("cy", y)
            .attr("r", 5)
            .attr("fill", colorMap[mp.party] || (mp.party_color ? `#${mp.party_color}` : "#808080"))
            .attr("class", "mp-dot")
            .on("mouseover", (event) => {
                tooltip.transition().duration(200).style("opacity", .9);
                tooltip.html(`<strong>${mp.name}</strong><br/>${mp.party}`)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", () => tooltip.style("opacity", 0));
    });


        
    });    


</script>    

    
</body>
</html>
